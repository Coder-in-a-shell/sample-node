name: Complete Continuous Delivery Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # ---------------------------------------------------------
  # CI PIPELINE
  # ---------------------------------------------------------
  ci-tests:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Unit Tests
        run: npm test

  build-and-push:
    needs: ci-tests
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/node-app:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/node-app:${{ github.sha }}

  # ---------------------------------------------------------
  # DEPLOY TO DEV & INTEGRATION
  # ---------------------------------------------------------
  deploy-dev:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Apply to DEV
        run: |
          sed -i "s|REPLACE_IMAGE|${{ secrets.DOCKER_USERNAME }}/node-app:${{ github.sha }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml -n dev
          kubectl apply -f k8s/deployment.yaml -n dev
          kubectl rollout status deployment/node-app -n dev --timeout=90s
      - name: Integration & E2E Tests (Mock)
        run: |
          echo "Running Integration tests against DEV environment..."
          sleep 5 # Simulating test execution time
          echo "Integration tests passed!"

  # ---------------------------------------------------------
  # DEPLOY TO STAGING
  # ---------------------------------------------------------
  deploy-staging:
    needs: deploy-dev
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Apply to STAGING
        run: |
          sed -i "s|REPLACE_IMAGE|${{ secrets.DOCKER_USERNAME }}/node-app:${{ github.sha }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml -n staging
          kubectl apply -f k8s/deployment.yaml -n staging
          kubectl rollout status deployment/node-app -n staging --timeout=90s

  # ---------------------------------------------------------
  # PARALLEL TESTING GATES (Running simultaneously against Staging)
  # ---------------------------------------------------------
  performance-test:
    needs: deploy-staging
    runs-on: self-hosted
    steps:
      - name: Run Load Tests
        run: |
          echo "Executing Performance Tests (e.g., using k6 or JMeter)..."
          sleep 10 
          echo "Performance check: SUCCESS"

  compliance-check:
    needs: deploy-staging
    runs-on: self-hosted
    steps:
      - name: Run Compliance Scan
        run: |
          echo "Executing Compliance Checks (e.g., using Open Policy Agent/Gatekeeper)..."
          sleep 5
          echo "Compliance check: SUCCESS"

  security-test:
    needs: deploy-staging
    runs-on: self-hosted
    steps:
      - name: Run DAST Security Scan
        run: |
          echo "Executing Dynamic Security Tests (e.g., using OWASP ZAP)..."
          sleep 15
          echo "Security check: SUCCESS"

  # ---------------------------------------------------------
  # THE PRODUCTION GATE (Manual Deploy Button)
  # ---------------------------------------------------------
  deploy-prod:
    # This job will ONLY trigger if ALL THREE parallel tests pass
    needs: [performance-test, compliance-check, security-test]
    runs-on: self-hosted
    environment: production # Triggers the manual GitHub UI Approval
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Apply to PROD
        run: |
          sed -i "s|REPLACE_IMAGE|${{ secrets.DOCKER_USERNAME }}/node-app:${{ github.sha }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml -n prod
          kubectl apply -f k8s/deployment.yaml -n prod
          kubectl rollout status deployment/node-app -n prod --timeout=90s
name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ---------------------------------------------------------
  # 1. CI PIPELINE (Runs on every push and PR)
  # ---------------------------------------------------------
  ci-tests:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Run Unit Tests
        run: npm test

  build-and-push:
    if: github.event_name == 'push'
    needs: ci-tests
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/node-app:${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

  # ---------------------------------------------------------
  # 2. DEPLOY TO DEV & STAGING (Only on main branch)
  # ---------------------------------------------------------
  deploy-dev:
    if: github.ref_type == 'branch' && github.ref_name == 'main'
    needs: build-and-push
    runs-on: self-hosted
    concurrency: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Apply to DEV using Kustomize
        run: |
          cd k8s/overlays/dev
          kustomize edit set image REPLACE_IMAGE=${{ secrets.DOCKER_USERNAME }}/node-app:${{ github.sha }}
          kubectl apply -k .
          kubectl rollout status deployment/dev-node-app -n dev --timeout=90s

  deploy-staging:
    if: github.ref_type == 'branch' && github.ref_name == 'main'
    needs: deploy-dev
    runs-on: self-hosted
    concurrency: staging
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Apply to STAGING using Kustomize
        run: |
          cd k8s/overlays/staging
          kustomize edit set image REPLACE_IMAGE=${{ secrets.DOCKER_USERNAME }}/node-app:${{ github.sha }}
          kubectl apply -k .
          kubectl rollout status deployment/staging-node-app -n staging --timeout=90s

  # ---------------------------------------------------------
  # 3. THE PRODUCTION GATE (Only on semantic version tags)
  # ---------------------------------------------------------
  deploy-prod:
    if: github.ref_type == 'tag'
    needs: build-and-push
    runs-on: self-hosted
    environment: production # Triggers the manual GitHub UI Approval
    concurrency: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Apply to PROD using Kustomize
        run: |
          cd k8s/overlays/prod
          kustomize edit set image REPLACE_IMAGE=${{ secrets.DOCKER_USERNAME }}/node-app:${{ github.ref_name }}
          kubectl apply -k .
          kubectl rollout status deployment/prod-node-app -n prod --timeout=90s
